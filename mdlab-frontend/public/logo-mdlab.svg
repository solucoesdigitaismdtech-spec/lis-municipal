<svg width="420" height="140" viewBox="0 0 420 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gotaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="55%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="labGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="dropletShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Símbolo: gota laboratorial com cruz/molécula -->
  <g transform="translate(20, 28)">
    <!-- Gota -->
    <path d="M42 6 C42 6 70 40 70 62 C70 79.5 57.9 92 42 92 C26.1 92 14 79.5 14 62 C14 40 42 6 42 6 Z" fill="url(#gotaGrad)"/>
    <!-- Brilho da gota -->
    <path d="M42 16 C42 16 60 42 60 60 C60 72 52 80 42 80 C42 80 42 16 42 16 Z" fill="url(#dropletShine)" opacity="0.5"/>
    <!-- Cruz médica branca dentro da gota -->
    <rect x="37" y="50" width="10" height="30" rx="2" fill="#ffffff"/>
    <rect x="27" y="60" width="30" height="10" rx="2" fill="#ffffff"/>
    <!-- Pontos de molécula (toque tech) -->
    <circle cx="42" cy="42" r="4" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Texto: MD Lab -->
  <g transform="translate(108, 0)">
    <!-- MD em azul-marinho (âncora da marca) -->
    <text x="0" y="78" font-family="'Sora', Arial, sans-serif" font-size="58" font-weight="800" fill="#1e1b4b" letter-spacing="-2">MD</text>
    <!-- Lab em gradiente teal-índigo -->
    <text x="118" y="78" font-family="'Sora', Arial, sans-serif" font-size="58" font-weight="700" fill="url(#labGrad)" letter-spacing="-1">Lab</text>

    <!-- Linha separadora -->
    <rect x="2" y="92" width="232" height="3" rx="1.5" fill="url(#labGrad)"/>

    <!-- Tagline -->
    <text x="3" y="114" font-family="'Sora', Arial, sans-serif" font-size="13.5" font-weight="600" fill="#1e1b4b" letter-spacing="3">ANÁLISES CLÍNICAS</text>
  </g>
</svg>
